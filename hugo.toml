baseURL = "https://aitinkers.fun/"
languageCode = "en-us"
title = "AI Tinker"
theme = "PaperMod"
enableRobotsTXT = true

[params]
  description = "notes from building strange systems with AI — by spiz"
  author = "spiz"
  keywords = ["AI", "automation", "agents", "machine learning", "tinker", "Claude", "LLM", "building with AI"]
  defaultTheme = "dark"
  ShowReadingTime = false
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowRelatedContent = true
  ShowToc = false
  mainSections = ["posts","notebook"]
  images = ["/images/clawdjester.jpeg"]

  [params.label]
    text = "AI Tinker"

  [params.homeInfoParams]
    Title = "AI Tinker"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    keys = ["title", "summary", "content"]

  [params.schema]
    publisherType = "Person"
    name = "spiz"
    siteURL = "https://aitinkers.fun/"

[params.profileMode]
  enabled = false

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/clawdbotworker"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 20

[[menu.main]]
  identifier = "notebook"
  name = "Notebook"
  url = "/notebook/"
  weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
